# Free-tier blueprint:
# - web: Vercel (Next.js)
# - socket: Render Web Service (Socket.io + Redis)
# Secrets must be set in the Render dashboard, not committed here.

services:
  - type: web
    name: beartv-socket
    runtime: node
    plan: free
    region: oregon
    # Free web services sleep after inactivity; the frontend wakes via /health.
    buildCommand: npm ci --include=dev && npm run db:generate
    startCommand: npm run start:socket
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Render injects PORT — do not hardcode it
      - key: AUTH_URL
        value: https://beartv.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://beartv.vercel.app
      - key: ADMIN_EMAILS
        value: rexdancer@beartv.com
      - key: ALLOW_INMEMORY_REDIS
        value: "true"
