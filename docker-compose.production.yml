# Production / NAS Docker Compose
# Usage:
#   cp .env.production.example .env.production
#   # fill secrets
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# Do NOT expose Postgres, Redis, or the NAS admin UI publicly.
# Only publish the web ports through Cloudflare Tunnel / Tailscale Funnel.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_STUN_SERVERS: ${NEXT_PUBLIC_STUN_SERVERS:-stun:stun.l.google.com:19302}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      TURN_URL: ${TURN_URL:-}
      TURNS_URL: ${TURNS_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      SOCKET_PORT: "3001"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      AUTH_URL: ${AUTH_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beartv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-beartv}
    volumes:
      - beartv_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No host ports — internal only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - beartv_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No host ports — internal only

  # Optional Coturn — enable with: --profile turn
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    profiles: ["turn"]
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

volumes:
  beartv_pg_data:
  beartv_redis_data:
